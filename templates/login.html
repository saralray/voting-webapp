<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#1f4037,#99f2c8);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
border-radius:20px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.google-btn{
background:#fff;
border:none;
border-radius:10px;
padding:12px;
font-weight:600;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
transition:0.2s;
}

.google-btn:hover{
transform:scale(1.03);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-4">

<div class="card text-center">

<h3 class="mb-3">🔐 Login</h3>

<p class="text-muted mb-4">Sign in to continue voting</p>

<a href="/login" class="google-btn w-100">

<img src="https://www.svgrepo.com/show/475656/google-color.svg" width="20">

Login with Google

</a>

<hr>

<a href="/" class="btn btn-outline-dark w-100 mt-3">Back to Home</a>

</div>

</div>

</div>

</div>

</body>
</html>
