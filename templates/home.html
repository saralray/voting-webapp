<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.card{
background:rgba(255,255,255,0.08);
border-radius:20px;
padding:25px;
}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-5">

<div class="card">

<h3 class="text-center mb-4">🗳 Voting System</h3>

<form method="POST">

<input class="form-control mb-3" name="name" placeholder="Your name" required>

{% for c in candidates %}

<div class="form-check mb-2">

<input class="form-check-input" type="radio" name="candidate" value="{{c[0]}}" required>

<label class="form-check-label">{{c[1]}}</label>

</div>

{% endfor %}

<button class="btn btn-primary w-100 mt-3">Submit Vote</button>

</form>

<hr>

<div class="d-grid gap-2">

<a href="/dashboard" class="btn btn-success">📊 Dashboard</a>

<a href="/admin" class="btn btn-warning">⚙ Admin Panel</a>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
