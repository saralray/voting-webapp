<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.card{
background:rgba(255,255,255,0.08);
border-radius:20px;
padding:25px;
}
</style>

</head>

<body>

<div class="container">
<div class="row justify-content-center">
<div class="col-lg-5">

<div class="card">

<h3 class="text-center mb-4">🗳 Voting System</h3>

<!-- ✅ ถ้ายังไม่ login -->
{% if not session.user %}

<div class="text-center">

<p class="mb-3">🔐 Please login to vote</p>

<a href="/login" class="btn btn-danger w-100 mb-3">
Login with Google
</a>

</div>

{% else %}

<!-- ✅ แสดง user -->
<div class="text-end mb-3">
  👋 {{session.user.name}}
  <img src="{{session.user.picture}}" width="35" class="rounded-circle">
  <a href="/logout" class="btn btn-sm btn-danger">Logout</a>
</div>

<!-- ✅ ฟอร์มโหวต -->
<form method="POST">

<input class="form-control mb-3" name="name" value="{{session.user.name}}" readonly>

{% for c in candidates %}
<div class="form-check mb-2">
<input class="form-check-input" type="radio" name="candidate" value="{{c[0]}}" required>
<label class="form-check-label">{{c[1]}}</label>
</div>
{% endfor %}

<button class="btn btn-primary w-100 mt-3">Submit Vote</button>

</form>

{% endif %}

<hr>

<div class="d-grid gap-2">
<a href="/dashboard" class="btn btn-success">📊 Dashboard</a>
<a href="/admin" class="btn btn-warning">⚙ Admin Panel</a>
</div>

</div>

</div>
</div>
</div>

</body>
</html>
